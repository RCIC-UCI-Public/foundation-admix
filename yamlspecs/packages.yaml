---
site: !include site.yaml
system:
   - gcc
   - gcc-c++
   - gcc-gfortran
   - !eval "'pcre2-devel' if int({{site.os_release}}) >= 10 else 'pcre-devel'"
   - zlib-devel
   - ruby
   - ruby-devel
   - rubygems
   - openssl-devel
   - !ifneq "{{site.os_release}},7,libssh-devel,libssh2-devel"
   - libcurl-devel
   - gettext
bootstrap:

# This are software components that are built at one version
# for Rocky9 and a different version for Rocky10
# See set-2024 and set-2026 for the logic to determine when to include this set of packages 
build_release_specific:
   - swig
   - swig-module
   - scons
   - scons-module
build0:
   - pigz
   - pigz-module
   - git-lfs
   - git-lfs-module
   - foundation-module
build:
manifest:
   - "{{build}}"
sets:
   - "2024"
   - "2026"
