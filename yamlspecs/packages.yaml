---
site: !include site.yaml
system:
   - gcc
   - gcc-c++
   - gcc-gfortran
   - !eval "'pcre2-devel' if int({{site.os_release}}) >= 10 else 'pcre-devel'"
   - zlib-devel
   - ruby
   - ruby-devel
   - rubygems
   - openssl-devel
   - !ifneq "{{site.os_release}},7,libssh-devel,libssh2-devel"
   - libcurl-devel
   - gettext
bootstrap:
build0:
   - pigz
   - pigz-module
   - scons
   - scons-module
   - !eval "'swig swig-module' if int({{site.os_release}}) < 10 else ''"
   - git-lfs
   - git-lfs-module
   - foundation-module
build:
manifest:
   - "{{build}}"
sets:
   - "2024"
   - !eval "'rocky10' if int({{site.os_release}}) >= 10 else ''"
