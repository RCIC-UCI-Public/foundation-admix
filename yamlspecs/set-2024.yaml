!include packages.yaml
---
versions: versions-2024.yaml
bootstrap:
   - git
   - git-module
   - asciidoctor
   - asciidoctor-module
build:
   - "{{build0}}"
   - !eval "'{{build_release_specific}}' if int({{site.os_release}}) < 10 else ''"
manifest:
   - git
   - git-module
   - "{{build}}"

# asciidoctor is only needed for building man pages of git-lfs
