!include packages.yaml
---
versions: versions-2024.yaml
bootstrap:
   - git
   - git-module
   - asciidoctor
   - asciidoctor-module
build:
   - "{{build0}}"
   - !OScmp "<,10,{{build_release_specific}},"
manifest:
   - git
   - git-module
   - "{{build}}"

# asciidoctor is only needed for building man pages of git-lfs
# it is not installed on the cluster
